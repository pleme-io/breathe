                            type: string
                          max:
                            description: The ceiling never exceeded, a quantity string. Omit ⇒ no cap (the whole pool). Empty string is treated as "no cap".
                            nullable: true
                            type: string
                          min:
                            default: '0'
                            description: The floor always granted (a reserved quota), a quantity string. Default `0`.
                            type: string
                          weight:
                            default: 1
                            description: Relative share weight. `1` (the default) ⇒ an even share; `0` ⇒ idle on this axis (claims only its floor). A larger weight buys a larger share.
                            format: uint32
                            minimum: 0.0
                            type: integer
                        required:
                        - dim
                        type: object
                      type: array
                    id:
                      description: Stable identity (a gaveta group-id or member-id), unique within the pool.
                      type: string
                    kind:
                      default: group
                      description: '`Group` (top-level) or `User` (child).'
                      enum:
                      - group
                      - user
                      type: string
                    parentId:
                      description: The parent claimant's id (a user's group). Omit for a top-level claimant.
                      nullable: true
                      type: string
                  required:
                  - id
                  type: object
                type: array
              dryRun:
                default: true
                description: 'SHADOW: the controller computes + publishes grants but the consumer (gaveta) should treat them as advisory. Default true (advisory-first). The pool NEVER carves a k8s/host limit regardless — it divides; the StorageBand holds the 80%. `dryRun` here marks the GRANT LEDGER advisory vs enforced.'
                type: boolean
              poolCapacity:
                description: The pool's total capacity per dimension. The allocatable band each dimension's claimants split is `capacity × setpoint`. A dimension absent here has a zero band (every claim on it is granted 0).
                items:
                  description: A pool-capacity entry — the total quantity of ONE dimension the band holds. The allocatable band per dimension is `capacity * setpoint`.
                  properties:
                    capacity:
                      description: The total capacity quantity for this dimension, a string in the dim's unit (`3.6Ti` for storage). The band the claimants split is this × `setpoint`.
                      type: string
                    dim:
                      description: The fabric dimension (`storage` / `cpu` / `bandwidth` / `request-rate`).
                      type: string
                  required:
                  - capacity
                  - dim
                  type: object
                type: array
              setpoint:
                default: 0.8
                description: The utilization setpoint — the fraction of capacity the claimants divide (the 80% band). Default `0.80`. Clamped to `(0, 1]` in the allocator.
                format: double
                type: number
              storageBandRef:
                description: 'OPTIONAL: pull the storage capacity from a referenced `StorageBand`''s `status.observedCapacity` instead of (or in addition to) an explicit `poolCapacity` storage entry — so the divider tracks the band that holds the pool. When set AND the band reports a capacity, it OVERRIDES the explicit storage entry. (The explicit entry is the shippable default; this is the destination coupling.)'
                nullable: true
                properties:
                  name:
                    description: The `StorageBand` name.
                    type: string
                  namespace:
                    description: The `StorageBand` namespace. Omit ⇒ the pool's own namespace.
                    nullable: true
                    type: string
                required:
                - name
                type: object
            required:
            - poolCapacity
            type: object
          status:
            description: '`QuinhaoPool` status — the computed grant ledger + the band summary.'
            nullable: true
            properties:
              band:
                additionalProperties:
                  format: int64
                  type: integer
                description: The allocatable band per dimension (`capacity × setpoint`), keyed by dim — what the claimants divided. Lets an operator see the band from the status.
                type: object
              claimCount:
                description: How many claimants carry a grant.
                format: int64
                nullable: true
                type: integer
              effectiveDryRun:
                description: Whether the published ledger is advisory (`dryRun`) — echoed for the consumer.
                nullable: true
                type: boolean
              grants:
                description: The grant ledger — one entry per claimant. THE surface gaveta consumes.
                items:
                  description: One claimant's computed grant — what gaveta reads. `grants[dim]` is the quota in that dimension's unit (bytes for storage).
                  properties:
                    grants:
                      additionalProperties:
                        format: int64
                        type: integer
                      description: The granted quota per dimension, keyed by dim string — raw quantities in the dim's unit (bytes for storage). gaveta reads `grants["storage"]` as the member's storage quota in bytes.
                      type: object
                    id:
                      description: The claimant id (a gaveta group-id or member-id).
                      type: string
                    kind:
                      description: '`Group` / `User` (echoed from the spec for ledger legibility).'
                      enum:
                      - group
                      - user
                      type: string
                    parentId:
                      description: The parent id, if a child (echoed for the consumer's tree walk).
                      nullable: true
                      type: string
                  required:
                  - grants
                  - id
                  - kind
                  type: object
                type: array
              lastSeenEpoch:
                format: int64
                nullable: true
                type: integer
              observedCapacity:
                additionalProperties:
                  format: int64
                  type: integer
                description: The effective pool capacity per dimension the controller resolved (after a `storageBandRef` override, if any), keyed by dim.
                type: object
              observedGeneration:
                description: '`metadata.generation` the controller last reconciled.'
                format: int64
                nullable: true
                type: integer
              phase:
                nullable: true
                type: string
              reason:
                description: A typed refusal when the claim forest is malformed (duplicate id / unknown parent / cycle) — the allocation is refused, never half-published.
                nullable: true
                type: string
            type: object
