                        - wbps
                        - riops
                        - wiops
                        type: string
                      unit:
                        type: string
                    required:
                    - device
                    - field
                    - unit
                    type: object
                  sysctl:
                    description: A dotted sysctl key (`vm.dirty_bytes`) → `/proc/sys/vm/dirty_bytes`.
                    properties:
                      key:
                        type: string
                    required:
                    - key
                    type: object
