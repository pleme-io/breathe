apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: breathenodepools.breathe.pleme.io
spec:
  group: breathe.pleme.io
  names:
    categories:
    - breathe
    kind: BreatheNodePool
    plural: breathenodepools
    shortNames:
    - bnp
    singular: breathenodepool
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.nodeName
      name: Node
      type: string
    - jsonPath: .spec.writeEnabled
      name: Writes
      type: boolean
    - jsonPath: .spec.arcMaxGiB
      name: ArcMaxGiB
      type: integer
    - jsonPath: .status.phase
      name: Phase
      type: string
    name: v1
    schema:
      openAPIV3Schema:
        description: Auto-generated derived type for BreatheNodePoolSpec via `CustomResource`
        properties:
          spec:
            description: 'The per-node L2 ceilings, mirrored from `pleme.nixos.nodeBudget` — the host agent refuses any write above these (the second safety wall). Cluster-scoped: one BreatheNodePool enrolls one node.'
            properties:
              arcMaxGiB:
                description: L2 ARC ceiling — `nodeBudget.arcMaxGiB` (the boot modprobe cap), in GiB (bounded ≤ 1 PiB so the bytes conversion cannot overflow).
                format: uint64
                maximum: 1048576.0
                minimum: 0.0
                type: integer
              cgroupCpuMaxMilli:
                additionalProperties:
                  format: uint64
                  minimum: 0.0
                  type: integer
                default: {}
                description: L2 cpu ceiling per systemd unit — the unit's cpu territory in MILLICORES (`nodeBudget` cpu budget). A `CgroupCpuBand` whose unit is absent here is refused (never written blind). Millicores need no overflow bound (they are compared, never multiplied), so a plain integer — unlike `GiB`.
                type: object
              cgroupMaxGiB:
                additionalProperties:
                  format: uint64
                  maximum: 1048576.0
                  minimum: 0.0
                  type: integer
                default: {}
                description: L2 cgroup ceiling per systemd unit — the unit's `nodeBudget` `memoryMaxGiB`, in GiB. A `CgroupBand` whose unit is absent here is refused (never written blind).
                type: object
              nodeName:
                description: The node this pool enrolls (matches `kubernetes.io/hostname`). The agent reconciles only the pool whose `nodeName` equals its own `NODE_NAME`.
                type: string
              writeEnabled:
                default: false
                description: Node-level MASTER write switch. `false` = the whole node is in SHADOW — every host band decides + reports but never mutates the host, regardless of per-band `dryRun`. The safe default; flip to `true` only after the shadow window holds.
                type: boolean
            required:
            - arcMaxGiB
            - nodeName
            type: object
          status:
            description: BreatheNodePool status — the enrollment receipt.
            nullable: true
            properties:
              lastSeenEpoch:
                format: int64
                nullable: true
                type: integer
              managedUnits:
                format: int64
                nullable: true
                type: integer
              observedNode:
                nullable: true
                type: string
              phase:
                nullable: true
                type: string
            type: object
        required:
        - spec
        title: BreatheNodePool
        type: object
    served: true
    storage: true
    subresources:
      status: {}
