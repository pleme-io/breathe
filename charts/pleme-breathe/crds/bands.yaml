---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: memorybands.breathe.pleme.io
spec:
  group: breathe.pleme.io
  names:
    categories:
    - breathe
    kind: MemoryBand
    plural: memorybands
    shortNames:
    - mband
    singular: memoryband
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.targetRef.kind
      name: Target
      type: string
    - jsonPath: .spec.targetRef.name
      name: Name
      type: string
    - jsonPath: .status.lastUtil
      name: Util
      type: string
    - jsonPath: .status.currentLimit
      name: Limit
      type: string
    - jsonPath: .status.lastDecision
      name: Last
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .status.conditions[?(@.type=='Ready')].status
      name: Ready
      type: string
    name: v1
    schema:
      openAPIV3Schema:
        description: Auto-generated derived type for MemoryBandSpec via `CustomResource`
        properties:
          spec:
            properties:
              ceiling:
                default: 16Gi
                type: string
              confirmAfterSeconds:
                default: 1800
                description: Clean-observation window (seconds) a `ShadowConfirmEffect` band holds Ready-and-healthy before it auto-promotes to carving (default 1800).
                format: uint64
                minimum: 0.0
                type: integer
              cooldownSeconds:
                default: 600
                format: uint64
                minimum: 0.0
                type: integer
              disruptionPolicy:
                description: The golden/ceiling gate (default `restartFreeOnly`). Omitted on serialize when default so the strict typed-gRPC surface stays safe.
                enum:
                - restartFreeOnly
                - allowConditional
                - allowRestart
                type: string
              dryRun:
                default: false
                type: boolean
              floor:
                default: 256Mi
                type: string
              forceLimit:
                description: 'BREAK-GLASS: pin the limit to exactly this value (a quantity string in the band''s unit, e.g. `8Gi` / `2`). breathe skips the band law and carves to it — but STILL through the gate (DisruptionPolicy + the single-writer guard + the L2 ceiling all apply; it cannot bypass safety). Clear it to resume normal homeostasis. Pair with `forceLimitExpiry` for an auto-releasing pin.'
                nullable: true
                type: string
              forceLimitExpiry:
                description: RFC3339 time after which `forceLimit` is ignored (auto-release the pin).
                nullable: true
                type: string
              growAbove:
                default: 0.85
                format: double
                type: number
              growFactor:
                default: 1.25
                format: double
                type: number
              maxStalenessSeconds:
                default: 120
                format: uint64
                minimum: 0.0
                type: integer
              mode:
                description: 'The PROMOTION LIFECYCLE. Unset ⇒ resolved by `promotion_mode()` (legacy `dryRun:true` → Shadow, else the fleet default `ShadowConfirmEffect`). Set explicitly to pin the state: `shadow` | `effect` | `shadowConfirmEffect` | `suspended`.'
                enum:
                - shadow
                - effect
                - shadowConfirmEffect
                - suspended
                nullable: true
                type: string
              peakDecay:
                default: 0.98
                description: The trailing-window PEAK decay per tick `∈ [0,1)` — the never-OOM shrink floor is keyed on the demonstrated PEAK working set (max RSS), which decays geometrically by this factor each tick so a real spike raises the floor and HOLDS it for a meaningful window rather than evaporating on the next low-water sample (the authentik-Celery OOM fix). Default 0.98 (a spike holds for ~tens of ticks); `0.0` = pure single-tick max (no window memory).
                format: double
                type: number
              predictive:
                description: 'M0 PREDICTIVE (opt-in, default off → behaviour byte-unchanged): when `true`, breathe measures the working-set velocity and pre-grows the limit for the projected burst via the proven `PredictiveGrow<BandLaw>` — asymmetric (only ever raises a grow), still `safety_clamp`-contained (the never-OOM oracle covers it). Shadow-first: observe the predictive grows under `dryRun` before promoting to live.'
                type: boolean
              predictiveLookaheadSeconds:
                default: 60
                description: Forecast horizon for predictive carving (seconds). Default 60s (≈ refresh + cooldown for memory); set higher for slow-filling resources (storage = resize-cooldown × safety factor).
                format: uint64
                minimum: 0.0
                type: integer
              requestFloor:
                description: The operator's declared `requests.<resource>` floor (a quantity string in the band's unit, e.g. `512Mi` / `250m`). A shrink can NEVER carve the limit below this — requests is the scheduler's guaranteed working set, and a limit under the request is both invalid in k8s and unsafe. Empty (the default) ⇒ no request floor. Typically mirrors the workload's actual `resources.requests.<resource>`.
                type: string
              setpoint:
                default: 0.8
                format: double
                type: number
              shrinkBelow:
                default: 0.7
                format: double
                type: number
              shrinkFactor:
                default: 0.9
                format: double
                type: number
              suspend:
                description: 'FREEZE this band — `true` ⇒ the controller skips observe/plan/act entirely (phase `Suspended`), the limit is left exactly as-is. Distinct from `dryRun` (which still observes + reports what it WOULD do): suspend is "stop deciding". Resume with `suspend:false`. The k8s-native pause.'
                type: boolean
              targetRef:
                description: The workload owner whose limit a band controls. For CNPG the kind is `Cluster` (the patched field lives on the `Cluster` CR); for storage the kind is `PersistentVolumeClaim`.
                properties:
                  apiVersion:
                    nullable: true
                    type: string
                  container:
                    nullable: true
                    type: string
                  kind:
                    type: string
                  name:
                    type: string
                  podSelector:
                    description: When set, breathe resolves the band's pods DIRECTLY by this k8s label selector (`k=v,k2=v2`) instead of via an owner's `spec.selector.matchLabels`. The path for **ephemeral / owner-less pod groups** whose name is not stable and which have no single resolvable workload owner — GitHub ARC `EphemeralRunner`s (`actions.github.com/scale-set-name=<set>`), bare pods, Job pods. A selector ALWAYS carves in-place (`PodResize`, zero restart) within `targetRef`'s namespace; `name` then serves only as the metrics pod-name prefix + the human label. Omit it for Deployment/StatefulSet/CNPG owners.
                    nullable: true
                    type: string
                required:
                - kind
                - name
                type: object
              warmupSeconds:
                default: 600
                description: 'WARMUP HOLD (seconds) — the minimum time a workload must be OBSERVED since its last (re)start before any SHRINK is permitted. A workload that restarted less than this ago has not demonstrated a full duty cycle, so its idle reading is not yet proof the slack is safe to reclaim: a shrink is HELD (phase `Warmup`) until the window elapses. A grow is never held. This closes the un-observed-boot-spike OOM (the authentik worker''s blueprint-discovery spike happens at boot, before the first scrape, so the demonstrated-peak floor only ever saw idle). Default 600s (10 min); `0` disables the gate.'
                format: uint64
                minimum: 0.0
                type: integer
            required:
            - targetRef
            type: object
          status:
            description: The per-cycle typed status receipt — shared across all band kinds.
            nullable: true
            properties:
              carvesTotal:
                description: Cumulative count of carves (Applied) over this controller's lifetime.
                format: int64
                nullable: true
                type: integer
              conditions:
                description: Standard conditions (Ready / Converged / Throttled / Stale / Conflict).
                items:
                  description: A standard k8s `metav1.Condition` (schemars-derivable — k8s_openapi's own `Condition` is not `JsonSchema`). Enables `kubectl wait --for=condition=…` and Flux/Argo health assessment off breathe bands.
                  properties:
                    lastTransitionTime:
                      description: RFC3339 time the condition last flipped status (stable while status holds).
                      type: string
                    message:
                      description: Human-readable message.
                      type: string
                    observedGeneration:
                      description: The `metadata.generation` the controller observed when setting this.
                      format: int64
                      nullable: true
                      type: integer
                    reason:
                      description: Machine-readable PascalCase reason.
                      type: string
                    status:
                      description: '`True` | `False` | `Unknown`.'
                      type: string
                    type:
                      description: Condition type, e.g. `Ready` / `Converged` / `Throttled` / `Stale` / `Conflict`.
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              conflictManager:
                nullable: true
                type: string
              conflictsTotal:
                description: Cumulative count of single-writer conflicts (yielded to another manager).
                format: int64
                nullable: true
                type: integer
              cooldownRemainingSeconds:
                description: Seconds remaining in the post-carve cooldown (0 = ready to carve).
                format: int64
                nullable: true
                type: integer
              currentLimit:
                nullable: true
                type: string
              deferralsTotal:
                description: Cumulative count of deferred ceiling crossings (policy refused a restart).
                format: int64
                nullable: true
                type: integer
              edgeTier:
                description: Where the last tick sat on the golden/ceiling line (`GoldenPreserving` / `CeilingCrossing`) — the K4 continuity evidence, surfaced.
                nullable: true
                type: string
              effectiveDryRun:
                description: 'The effective mode: `true` = SHADOW (observe + attest, never carve).'
                nullable: true
                type: boolean
              effectivePolicy:
                description: The DisruptionPolicy in effect for this band (`restartFreeOnly` / …).
                nullable: true
                type: string
              freshnessSeconds:
                description: Age of the driving metric sample, in seconds (the freshness gate input).
                format: int64
                nullable: true
                type: integer
              history:
                description: The recent TRAJECTORY (over-time view as a k8s object) — appended on a carve or a phase change, capped to the last N samples.
                items:
                  description: A point in a band's recent trajectory — the OVER-TIME view as a k8s object (no Grafana needed). Appended on a carve or a phase change, capped to the last N, so `kubectl get <band> -o yaml` shows how the adjustments have been going inline.
                  properties:
                    decision:
                      description: The decision that produced this sample (carve / transition).
                      nullable: true
                      type: string
                    limit:
                      description: The limit at this point.
                      format: int64
                      nullable: true
                      type: integer
                    phase:
                      description: The phase at this point.
                      type: string
                    time:
                      description: RFC3339 time of this sample.
                      type: string
                    util:
                      description: Observed utilization ratio at this point.
                      format: double
                      nullable: true
                      type: number
                  required:
                  - phase
                  - time
                  type: object
                type: array
              lastActionClass:
                description: The restart cost of the last carve/decision (`RestartFree` / `RestartConditional` / `RestartRequiring`) — the per-tick attestation evidence, now typed in status.
                nullable: true
                type: string
              lastChangeEpoch:
                format: int64
                nullable: true
                type: integer
              lastDecision:
                nullable: true
                type: string
              lastUtil:
                nullable: true
                type: string
              observedCapacity:
                description: The observed `capacity` (the current limit the util is measured against).
                format: int64
                nullable: true
                type: integer
              observedCostRemainingCents:
                description: Cost remaining (cents) under the namespace's `Densa` envelope SLA; negative ⇒ over budget. Read from the namespace `Densa`'s status — the Dev-Loop cost-guard surfaced on the band, so `kubectl get <band>` shows the env's budget headroom. Read-only (breathe never writes the Densa from a band).
                format: int64
                nullable: true
                type: integer
              observedEnvId:
                description: The `EphemeralEnvId` of the band's namespace, if it carries one (the ephemeral-env binding) — read from the namespace label, never written.
                nullable: true
                type: string
              observedGeneration:
                description: '`metadata.generation` the controller last reconciled — the "controller has seen my latest spec edit" signal.'
                format: int64
                nullable: true
                type: integer
              observedPeakUsed:
                description: 'The trailing-window PEAK working set (max RSS, with slow decay) — the never-OOM shrink floor is keyed on THIS, not the instantaneous `observed_used` (the authentik-Celery-worker OOM fix). Carried across ticks: each tick folds the current `used` into the prior peak via `breathe_control::update_peak`, so a recently-demonstrated spike holds the floor up for a meaningful window.'
                format: int64
                nullable: true
                type: integer
              observedUsed:
                description: The observed `used` scalar (bytes for memory/arc/cgroup; millicores for cpu).
                format: int64
                nullable: true
                type: integer
              observedUtil:
                description: The observed utilization that drove this tick, as a ratio (`used/capacity`).
                format: double
                nullable: true
                type: number
              phase:
                nullable: true
                type: string
              warmupStartEpoch:
                description: The epoch (unix secs) the band's WARMUP window started — the last observed (re)start of the target, or the band's first successful observation. The reconcile layer derives `observed_for_secs = now - warmup_start_epoch` to drive the warmup gate (a shrink is held until this exceeds `warmup_seconds`). Reset to `now` whenever a target restart is detected (the live limit dropped back to the template default / the observed capacity collapsed), so a fresh boot spike is always observed before any carve resumes. `None` until first observed.
                format: int64
                nullable: true
                type: integer
            type: object
        required:
        - spec
        title: MemoryBand
        type: object
    served: true
    storage: true
    subresources:
      status: {}
