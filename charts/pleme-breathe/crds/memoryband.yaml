apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: memorybands.breathe.pleme.io
spec:
  group: breathe.pleme.io
  names:
    categories:
    - breathe
    kind: MemoryBand
    plural: memorybands
    shortNames:
    - mband
    singular: memoryband
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.targetRef.kind
      name: Target
      type: string
    - jsonPath: .spec.targetRef.name
      name: Name
      type: string
    - jsonPath: .status.lastUtil
      name: Util
      type: string
    - jsonPath: .status.currentLimit
      name: Limit
      type: string
    - jsonPath: .status.lastDecision
      name: Last
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    name: v1
    schema:
      openAPIV3Schema:
        description: Auto-generated derived type for MemoryBandSpec via `CustomResource`
        properties:
          spec:
            properties:
              ceiling:
                default: 16Gi
                description: Never grow above this. Kubernetes quantity. Default `16Gi`.
                type: string
              cooldownSeconds:
                default: 600
                description: Minimum seconds between limit changes for this target. Default `600`.
                format: uint64
                minimum: 0.0
                type: integer
              dryRun:
                default: false
                description: Observe-and-attest only; never mutate (the shadow window). Default `false`.
                type: boolean
              floor:
                default: 256Mi
                description: Never shrink below this. Kubernetes quantity. Default `256Mi`.
                type: string
              growAbove:
                default: 0.85
                description: Grow when utilization is strictly above this. Default `0.85`.
                format: double
                type: number
              growFactor:
                default: 1.25
                description: Limit multiplier on grow. Default `1.25`.
                format: double
                type: number
              maxStalenessSeconds:
                default: 120
                description: Max acceptable metric sample age before a mutation is refused. Default `120`.
                format: uint64
                minimum: 0.0
                type: integer
              setpoint:
                default: 0.8
                description: Target utilization setpoint (used / limit). Default `0.80` (80/20).
                format: double
                type: number
              shrinkBelow:
                default: 0.7
                description: Shrink when utilization is strictly below this. Default `0.70`.
                format: double
                type: number
              shrinkFactor:
                default: 0.9
                description: Limit multiplier on shrink (gentle). Default `0.90`.
                format: double
                type: number
              targetRef:
                description: The workload owner whose memory limit this band controls.
                properties:
                  apiVersion:
                    description: Optional explicit apiVersion override (e.g. `postgresql.cnpg.io/v1`).
                    nullable: true
                    type: string
                  container:
                    description: Container within the pod template; `None` = the first container.
                    nullable: true
                    type: string
                  kind:
                    description: '`Deployment` | `StatefulSet` | `Cluster` (CNPG). Drives the apiVersion.'
                    type: string
                  name:
                    description: The owner's metadata.name (same namespace as the MemoryBand).
                    type: string
                required:
                - kind
                - name
                type: object
            required:
            - targetRef
            type: object
          status:
            description: Typed status — the per-cycle receipt for this band.
            nullable: true
            properties:
              conflictManager:
                description: 'When phase == Conflict: the competing field-manager we yielded to.'
                nullable: true
                type: string
              currentLimit:
                nullable: true
                type: string
              lastChangeEpoch:
                format: int64
                nullable: true
                type: integer
              lastDecision:
                nullable: true
                type: string
              lastUtil:
                nullable: true
                type: string
              phase:
                description: '`Holding` | `Growing` | `Shrinking` | `AtCeiling` | `Cooldown` | `Conflict` | `Stale` | `NoLimit` | `TargetNotFound` | `MetricsMissing`.'
                nullable: true
                type: string
            type: object
        required:
        - spec
        title: MemoryBand
        type: object
    served: true
    storage: true
    subresources:
      status: {}
