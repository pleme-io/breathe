apiVersion: apps/v1
kind: Deployment
metadata:
  name: breathe-controller
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: pleme-breathe
    app.kubernetes.io/component: controller
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: Recreate          # singleton; never two reconcilers racing one field
  selector:
    matchLabels:
      app.kubernetes.io/name: pleme-breathe
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pleme-breathe
        app.kubernetes.io/component: controller
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: controller
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: BREATHE_PROMETHEUS_URL
              value: {{ .Values.prometheusUrl | quote }}
            - name: BREATHE_REQUEUE_SECONDS
              value: {{ .Values.requeueSeconds | quote }}
            - name: RUST_LOG
              value: {{ .Values.logLevel | quote }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
