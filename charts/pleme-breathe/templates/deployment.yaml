apiVersion: apps/v1
kind: Deployment
metadata:
  name: breathe-controller
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: pleme-breathe
    app.kubernetes.io/component: controller
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: Recreate          # singleton; never two reconcilers racing one field
  selector:
    matchLabels:
      app.kubernetes.io/name: pleme-breathe
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pleme-breathe
        app.kubernetes.io/component: controller
      # NOTE (2026-07-11): metrics.enabled was already USER-SUPPLIED in the
      # live release's values (helm get values shows metrics.enabled=true)
      # but this chart never consumed it — the controller's own :9100
      # /metrics listener is unconditional (breathe-controller/src/main.rs)
      # but the scrape annotations + containerPort below were only ever
      # hand-patched onto the live Deployment out of band, same drift class
      # as the RBAC/CRD grants. Wiring the value the release already passes
      # closes that drift instead of leaving it live-only.
      {{- if .Values.metrics.enabled }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9100"
        prometheus.io/path: /metrics
      {{- end }}
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.priorityClassName }}
      priorityClassName: {{ .Values.priorityClassName }}
      {{- else if .Values.priorityClass.create }}
      priorityClassName: {{ .Values.priorityClass.name }}
      {{- end }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: controller
          # image.digest (a full "sha256:..." string), when set, wins over
          # image.tag. Landed 2026-07-11 after `:latest` was observed to
          # move digests TWICE in one live-verification pass (image.yml
          # republishes :latest on every merge touching Rust/Cargo — a
          # fast-moving target during active development), which upgraded
          # this exact release to an unverified image via IfNotPresent
          # serving a stale locally-cached :latest. A tag can only ever
          # express "whatever this mutable pointer resolves to right now";
          # a digest is the only way this chart can pin a release to a
          # SPECIFIC, proven-good image byte-for-byte.
          {{- if .Values.image.digest }}
          image: "{{ .Values.image.repository }}@{{ .Values.image.digest }}"
          {{- else }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          {{- end }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- if .Values.metrics.enabled }}
          ports:
            - name: metrics
              containerPort: 9100
              protocol: TCP
          {{- end }}
          env:
            # POD_NAME: same live-but-uncommitted drift as the annotations
            # above. Optional at the app layer (Reporter::instance reads it
            # via std::env::var(...).ok() in main.rs — absence degrades to
            # no per-pod identity tag, never a startup failure) but real —
            # it was already hand-patched onto the live Deployment.
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: metadata.name
            - name: BREATHE_PROMETHEUS_URL
              value: {{ .Values.prometheusUrl | quote }}
            - name: BREATHE_REQUEUE_SECONDS
              value: {{ .Values.requeueSeconds | quote }}
            - name: RUST_LOG
              value: {{ .Values.logLevel | quote }}
            # NATS reactive-reconcile trigger (task #90) — additive, default-OFF.
            # natsReactiveEnabled=false (the chart default) ⇒
            # BREATHE_NATS_RECONCILE_ENABLED="false" ⇒ nats_trigger::resolve_trigger's
            # gate 2 is unmet ⇒ reconcile_all_on is never called, regardless of
            # natsReactiveUrl. See values.yaml's own comment for the flip conditions.
            - name: BREATHE_NATS_URL
              value: {{ .Values.natsReactiveUrl | quote }}
            - name: BREATHE_NATS_RECONCILE_ENABLED
              value: {{ .Values.natsReactiveEnabled | quote }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
