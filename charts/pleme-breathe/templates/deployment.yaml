apiVersion: apps/v1
kind: Deployment
metadata:
  name: breathe-controller
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: pleme-breathe
    app.kubernetes.io/component: controller
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: Recreate          # singleton; never two reconcilers racing one field
  selector:
    matchLabels:
      app.kubernetes.io/name: pleme-breathe
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pleme-breathe
        app.kubernetes.io/component: controller
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: controller
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: BREATHE_PROMETHEUS_URL
              value: {{ .Values.prometheusUrl | quote }}
            - name: BREATHE_REQUEUE_SECONDS
              value: {{ .Values.requeueSeconds | quote }}
            - name: RUST_LOG
              value: {{ .Values.logLevel | quote }}
            # NATS reactive-reconcile trigger (task #90) — additive, default-OFF.
            # natsReactiveEnabled=false (the chart default) ⇒
            # BREATHE_NATS_RECONCILE_ENABLED="false" ⇒ nats_trigger::resolve_trigger's
            # gate 2 is unmet ⇒ reconcile_all_on is never called, regardless of
            # natsReactiveUrl. See values.yaml's own comment for the flip conditions.
            - name: BREATHE_NATS_URL
              value: {{ .Values.natsReactiveUrl | quote }}
            - name: BREATHE_NATS_RECONCILE_ENABLED
              value: {{ .Values.natsReactiveEnabled | quote }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
