{{- if .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.serviceAccount.name }}
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: pleme-breathe
    app.kubernetes.io/managed-by: {{ .Release.Service }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
{{- if .Values.rbac.create }}
---
# breathe owns the band CRs + the memory-limit field on the target owners.
# It NEVER writes spec.replicas (KEDA's field) — the disjoint-field
# composition contract is enforced by what verbs this role does *not* grant.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: pleme-breathe-controller
  labels:
    app.kubernetes.io/name: pleme-breathe
rules:
  # NOTE (2026-07-11): kubeparambands/breathecloudpools/quinhaopools/
  # replicabands/appbands were MISSING from this checked-in list despite
  # being live-granted at various points (confirmed absent by re-reading
  # this file before this change, same class of drift as the "nodes" grant
  # below) — the live ClusterRole carried them only because they were
  # hand-patched onto the cluster out of band. The first pass here (task
  # #91/#92/#94) landed isolationbands + the other three but MISSED
  # replicabands/appbands despite task #92's own title naming them —
  # caught live 2026-07-11 when FluxCD did its first genuine fresh apply
  # from this OCI-published chart and the 403s came right back (the
  # earlier "fix" was a live hand-patch that never made it into this
  # template). Landing all six here closes that drift so a future `helm
  # upgrade`/reinstall from this chart cannot silently revoke a
  # currently-working grant.
  - apiGroups: ["breathe.pleme.io"]
    resources:
      - "memorybands"
      - "memorybands/status"
      - "cpubands"
      - "cpubands/status"
      - "storagebands"
      - "storagebands/status"
      - "kubeparambands"
      - "kubeparambands/status"
      - "breathecloudpools"
      - "breathecloudpools/status"
      - "quinhaopools"
      - "quinhaopools/status"
      - "isolationbands"
      - "isolationbands/status"
      - "replicabands"
      - "replicabands/status"
      - "appbands"
      - "appbands/status"
    verbs: ["get", "list", "watch", "patch", "update"]
  # Host-dim bands: READ-ONLY. The controller lists these only to aggregate the
  # fleet BreatheOverview — the host-agent owns their status (no patch here).
  - apiGroups: ["breathe.pleme.io"]
    resources: ["arcbands", "cgroupbands", "cgroupcpubands"]
    verbs: ["get", "list", "watch"]
  # BreathePosture: READ-ONLY, same shape as the host-dim bands above — pure
  # reference data the controller resolves via a reflector::Store every
  # reconcile tick (breathe-controller/src/main.rs), never writes. Missing
  # from chart 0.1.28's initial ship (a597770/b0406ae) — found live 2026-07-24
  # via a real 403 on the first postureRef-migrated CRs on camelot-eks
  # ("breathepostures.breathe.pleme.io is forbidden ... cannot list resource
  # breathepostures ... at the cluster scope"): every postureRef silently fell
  # through to the compiled default instead of resolving the referenced
  # posture. No live blast radius at the time (every affected CR was
  # dryRun: true), but this is load-bearing before ANY postureRef-referencing
  # band can be trusted, shadow or live.
  - apiGroups: ["breathe.pleme.io"]
    resources: ["breathepostures"]
    verbs: ["get", "list", "watch"]
  # Part 1 (SOFT k8s carve): the controller CREATES/updates a PodMemoryHigh dispatch
  # per managed pod when a MemoryBand efficiency carve routes to memory.high. The
  # host-agent reconciles + owns the status; the controller writes spec only (SSA).
  - apiGroups: ["breathe.pleme.io"]
    resources: ["podmemoryhighs"]
    verbs: ["get", "list", "watch", "create", "patch", "update"]
  # The fleet-overview object (bov): the controller keeps its status current.
  - apiGroups: ["breathe.pleme.io"]
    resources: ["breatheoverviews", "breatheoverviews/status"]
    verbs: ["get", "list", "watch", "patch", "update"]
  # The fleet config object (bcfg): read on startup + on reload.
  - apiGroups: ["breathe.pleme.io"]
    resources: ["breatheconfigs"]
    verbs: ["get", "list", "watch"]
  # M3 (Dev Loop): READ-ONLY the namespace's ephemeral-env cost-guard — the
  # EnvId label on the Namespace + the namespace's Densa envelope status. breathe
  # never WRITES either (no patch/update verb) — it only surfaces them on the band.
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list"]
  - apiGroups: ["breathe.pleme.io"]
    resources: ["densas"]
    verbs: ["get", "list", "watch"]
  # The target owners breathe patches limits.{memory,cpu} on (true SSA).
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets", "daemonsets"]
    verbs: ["get", "list", "watch", "patch"]
  - apiGroups: ["postgresql.cnpg.io"]
    resources: ["clusters"]
    verbs: ["get", "list", "watch", "patch"]
  # The storage dimension grows PVC requests.storage (CSI online-resize).
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "list", "watch", "patch"]
  # The storage capability gate (task #167) reads the PVC's own StorageClass
  # to detect allowVolumeExpansion + provisioner before ever planning a
  # carve -- read-only, no patch. Missing this makes the whole gate silently
  # inert: read_storage_capability's Cluster trait default is Ok(None), so an
  # RBAC-forbidden read is indistinguishable from "no capability info" and
  # the CapabilityMissing/Unsupported terminal never fires (caught live
  # 2026-07-16: kubectl auth can-i get storageclasses returned "no", and both
  # local-path-backed StorageBands showed Supported=True/CapabilityOk
  # instead of the expected Unsupported).
  - apiGroups: ["storage.k8s.io"]
    resources: ["storageclasses"]
    verbs: ["get", "list", "watch"]
  # Read pods for owner→pod resolution (metric label scoping); the
  # pods/resize subresource + patch verb close the same class of live-but-
  # uncommitted drift as the block above — in-place pod vertical resize
  # (k8s 1.33+ InPlacePodVerticalScaling) was already hand-patched onto the
  # live ClusterRole and is exercised by the memory.high routing path
  # (breathe-control commit 986f3ea).
  - apiGroups: [""]
    resources: ["pods", "pods/resize"]
    verbs: ["get", "list", "patch"]
  # correnteza node-tier: the OPENING claim path (node_forma.rs — patches a
  # node's taints/labels to claim it into a BreatheCloudPool on a Grew tick,
  # task #84 proven live) AND the CLOSING origin_guard path (isolation_band.rs
  # — keeps a declared IsolationBand's targetNodes tainted every tick) both
  # read + patch Node objects; the kwok go-live bed additionally create/deletes
  # its OWN fake nodes (never a real one — see node_forma::is_kwok_managed).
  # NOTE: this grant was MISSING from this checked-in chart despite the
  # already-shipped node_forma.rs claim path depending on it (confirmed absent
  # by re-reading this file before this change) — the live release currently
  # carries it only because it was hand-patched onto the cluster out of band.
  # Landing it here closes that drift, not just adds origin_guard's need.
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch", "patch", "create", "delete"]
  # Read live container usage from metrics-server (the always-on metric source).
  - apiGroups: ["metrics.k8s.io"]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: ["", "events.k8s.io"]   # core + the events.k8s.io/v1 API kube 0.96 Recorder uses
    resources: ["events"]
    verbs: ["create", "patch"]
  # EksKarpenter backend (BreatheCloudPool.spec.nodeProvisioningBackend):
  # READ the real karpenter.sh NodePool (authored by pleme-lib's
  # _karpenter.tpl, never written by breathe); mint/delete karpenter.sh
  # NodeClaim — the per-request unit real Karpenter's own nodeclaim/lifecycle
  # controller launches from. breathe never writes NodePool.
  - apiGroups: ["karpenter.sh"]
    resources: ["nodepools"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["karpenter.sh"]
    resources: ["nodeclaims"]
    verbs: ["get", "list", "watch", "create", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: pleme-breathe-controller
  labels:
    app.kubernetes.io/name: pleme-breathe
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: pleme-breathe-controller
subjects:
  - kind: ServiceAccount
    name: {{ .Values.serviceAccount.name }}
    namespace: {{ .Release.Namespace }}
{{- end }}
{{- if .Values.agent.enabled }}
---
# The HANDS' identity. The agent does NO k8s-workload mutation — it watches the
# host band CRs + its BreatheNodePool and patches their status. Its host power
# comes from the pod SecurityContext (privileged), not from k8s RBAC; this role
# is deliberately narrow — breathe CRs only, no apps/cnpg/pvc verbs.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.agent.serviceAccount.name }}
  namespace: {{ .Values.agent.namespace }}
  labels:
    app.kubernetes.io/name: pleme-breathe
    app.kubernetes.io/component: host-agent
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: pleme-breathe-host-agent
  labels:
    app.kubernetes.io/name: pleme-breathe
rules:
  - apiGroups: ["breathe.pleme.io"]
    resources:
      - "arcbands"
      - "arcbands/status"
      - "cgroupbands"
      - "cgroupbands/status"
      - "cgroupcpubands"
      - "cgroupcpubands/status"
      - "breathenodepools"
      - "breathenodepools/status"
      # Part 1 (SOFT k8s carve): the agent reconciles the controller's PodMemoryHigh
      # dispatch — writes the pod's memory.high cgroup file + owns the status.
      - "podmemoryhighs"
      - "podmemoryhighs/status"
    verbs: ["get", "list", "watch", "patch", "update"]
  - apiGroups: ["", "events.k8s.io"]   # core + the events.k8s.io/v1 API kube 0.96 Recorder uses
    resources: ["events"]
    verbs: ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: pleme-breathe-host-agent
  labels:
    app.kubernetes.io/name: pleme-breathe
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: pleme-breathe-host-agent
subjects:
  - kind: ServiceAccount
    name: {{ .Values.agent.serviceAccount.name }}
    namespace: {{ .Values.agent.namespace }}
{{- end }}
