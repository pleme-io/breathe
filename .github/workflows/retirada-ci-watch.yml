# Job-shaped retirada — the automatic queue-starvation watcher
# (breathe-retirada-ci, theory/BREATHABILITY.md "Retirada's job-shaped
# sibling"). Confirmed 2026-07-23 against two real incidents
# (this repo's own run 29930406877, hardened-images' 30007679929) that
# the actual failure mode on camelot-builder-pleme is a job sitting
# queued with ZERO runner ever assigned until GitHub's own 24h
# queue-timeout gives up -- not a mid-job spot reclaim. Any job
# confirmed starved past the threshold gets automatically redispatched
# onto the existing on-demand escape hatch (image.yml's own
# `runnerOverride` input), bounded by a stateless retry ceiling (never
# more than one auto-retry per commit -- see breathe-retirada-ci's
# `already_redispatched`/`count_prior_auto_retries`).
#
# Effective cadence: GitHub's own `schedule:` trigger has a real,
# documented 5-minute floor (sub-minute cron is accepted but not
# reliably honored). Rather than fight that floor, each 5-minute
# invocation loops INTERNALLY (--loop-for-secs 270, --poll-interval-secs
# 60) -- so detection actually happens roughly every 60s, bounded by the
# poll interval, not GitHub's scheduler; the 5-minute trigger is just
# the keep-alive that starts the next loop window shortly after the
# previous one closes.
#
# The threshold ITSELF is algorithmically adjusting, not a fixed
# constant: by default it's the p95 of REAL recently observed Wake
# latency (started_at - created_at for jobs that did get a runner),
# scaled up 3x for headroom, floored at --starvation-threshold-secs --
# so it drifts automatically as the pool's real cold-start behavior
# drifts, never hand-retuned, never stale (statistics, never ML, per
# the org's own autorevivy doctrine). Live-verified 2026-07-23: a real
# run against this exact workflow computed a threshold from 83 real
# observed Wake samples before this was ever wired into the schedule.
#
# Needs ONLY this repo's own default GITHUB_TOKEN (actions:write,
# declared below) -- no k8s RBAC, no cluster credentials, no new
# secret. That is the whole reason this failure mode is safe to
# automate: detection never touches a pod, only the GitHub Jobs API.
#
# Interim, named honestly: the CLI builds via cargo + a build cache
# here, not yet through this repo's own multi-flake Nix composition
# (breathe-retirada-ci isn't wired into flake.nix's binFor/apps
# machinery yet) -- a real gap against the org's Nix-only convention,
# scoped this way to ship the watcher live rather than block on a
# larger flake-integration pass. Track as a follow-up, not silently
# accepted as the destination.
name: retirada-ci-watch

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:
    inputs:
      dryRun:
        description: "Report findings without dispatching anything"
        type: boolean
        default: false

permissions:
  contents: read
  actions: write

concurrency:
  group: retirada-ci-watch
  cancel-in-progress: false

jobs:
  watch:
    if: github.repository == 'pleme-io/breathe'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "breathe-retirada-ci -> target"
          shared-key: retirada-ci-watch

      - run: cargo build --release -p breathe-retirada-ci --features watch-cli --bin retirada-ci-watch
        working-directory: .

      - name: Watch image.yml for starved jobs (internal loop, ~60s effective cadence)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUST_LOG: info
        # No shell conditional -- --dry-run takes an explicit true/false
        # value (clap `ArgAction::Set`, not a bare presence flag), so the
        # `inputs.dryRun || 'false'` fallback is expressed natively in
        # GitHub's own expression syntax: `schedule`-triggered runs have
        # no `inputs` context at all (evaluates to null, `||` supplies
        # 'false'); `workflow_dispatch` runs pass the real value through.
        run: >-
          ./target/release/retirada-ci-watch
          --repo pleme-io/breathe --workflow image.yml
          --loop-for-secs 270 --poll-interval-secs 60
          --dry-run=${{ inputs.dryRun || 'false' }}
