# Build + push the breathe-controller OCI image on merge to main.
#
# Runs on a GitHub Linux runner (network available — sidesteps the rio
# FOD-DNS-in-sandbox blocker), nix-builds the distroless image from flake.nix,
# and pushes it PRIVATE to ghcr.io/pleme-io/breathe-controller via skopeo.
# This is the go-live unblock for the rio shadow deploy.
name: image

on:
  push:
    branches: [main]
    paths:
      - "**/*.rs"
      - "**/Cargo.*"
      - "flake.nix"
      - "flake.lock"
      - ".github/workflows/image.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - name: Build the OCI image (distroless, Linux)
        run: nix build .#image --print-build-logs
      - name: Push (private — breathe is private)
        run: |
          # nixpkgs skopeo rejects the runner's v1 /etc/containers/registries.conf;
          # point it at a minimal v2 file and push with --dest-creds (no login step).
          echo 'unqualified-search-registries = []' > /tmp/registries.conf
          export CONTAINERS_REGISTRIES_CONF=/tmp/registries.conf
          IMG=ghcr.io/pleme-io/breathe-controller
          CREDS="${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}"
          nix run nixpkgs#skopeo -- copy --dest-creds "$CREDS" docker-archive:result "docker://$IMG:0.1.0"
          nix run nixpkgs#skopeo -- copy --dest-creds "$CREDS" docker-archive:result "docker://$IMG:latest"
          echo "pushed $IMG:0.1.0 + :latest (private)"
