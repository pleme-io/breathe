# Build + push EVERY breathe OCI image on merge to main.
#
# RUNNER IS A CONFIG CHOICE, NOT A HARDCODED BOX. `runner:` resolves from the
# repo/org Actions VARIABLE `CAMELOT_IMAGE_RUNNER`, falling back to `rio-build-01`
# when the variable is unset. This retires the rio SPOF for camelot image builds:
# set `CAMELOT_IMAGE_RUNNER=camelot-builder-pleme` (the pleme-io-org ARC scale set on
# camelot's own 100%-spot builder floor — akeylesslabs/k8s clusters/camelot/ci/
# runner-scale-set-pleme.yaml) and every breathe image builds in-cluster, scale-to-
# zero, no rio. Until the variable is set (and its scale set is live), the rio
# fallback keeps builds working — a clean, reversible cutover, never a hard break.
#
# WARM CACHE: when running on the camelot builder floor, `CAMELOT_SUI_SUBSTITUTER`
# (= http://sui.camelot-build.svc) wires the in-cluster sui super-cache daemon as a
# Nix substituter so heavy crates SUBSTITUTE instead of compiling; the daemon serves
# unsigned NARs, so `CAMELOT_SUI_REQUIRE_SIGS=false` accepts them. Empty on any
# non-cluster runner (rio can't reach a ClusterIP) — zero effect there.
#
# breathe images stay PRIVATE (package visibility set out-of-band).
#
# ★ AUTOBUMP + the camelot CHANNEL extension (2026-07-11). Every push emits a
# sortable, exact, immutable tag — never :latest as a deploy source (org ★
# AUTOBUMP directive). Two channels share one image (one ghcr package, one
# ImageRepository per app):
#   main         -> amd64-r<run>-<sha>          (the fleet-wide stream)
#   camelot/**   -> amd64-camelot-r<run>-<sha>  (Camelot-only stream)
# A camelot/* branch build never touches main's tag lineage or any other
# cluster's ImagePolicy (its pattern requires the "camelot-" infix main's
# never carries, and vice versa) -- so Camelot can run ahead of / diverged
# from the fleet by pushing to a camelot/* branch, with zero risk to rio or
# any other subscriber. See k8s/clusters/rio/infrastructure/flux-image-
# automation/RUNBOOK.md for the ImageRepository/ImagePolicy/
# ImageUpdateAutomation shape this tag scheme is designed to feed; Camelot's
# own equivalent lives in akeyless-k8s/clusters/camelot-mode1/infrastructure/
# flux-image-automation/.
name: image

on:
  push:
    branches: [main, "camelot/**"]
    paths:
      - "**/*.rs"
      - "**/Cargo.*"
      - "flake.nix"
      - "flake.lock"
      - ".github/workflows/image.yml"
  workflow_dispatch:
    inputs:
      runnerOverride:
        description: >-
          Escape hatch for when CAMELOT_IMAGE_RUNNER's scale set is broken
          (e.g. its ClusterSecretStore credential isn't provisioned yet —
          see task tracker "camelot-builder-pleme ARC scale set broken").
          Set to a real GitHub-hosted label (e.g. ubuntu-24.04) to bypass
          it for one manual run. Empty (default) = normal var-driven
          selection, unaffected. Never rio-build-01 for Camelot images
          (org rule) — this input exists so the fallback never silently
          becomes rio.
        type: string
        default: ""

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  controller:
    name: breathe-controller image → ghcr.io
    uses: pleme-io/substrate/.github/workflows/image-push.yml@main
    with:
      imageAttr: image
      imageName: pleme-io/breathe-controller
      tag: amd64-${{ startsWith(github.ref_name, 'camelot/') && 'camelot-' || '' }}r${{ github.run_number }}-${{ github.sha }}
      additionalTags: ${{ startsWith(github.ref_name, 'camelot/') && 'amd64-camelot-latest' || 'amd64-latest' }}
      runner: ${{ inputs.runnerOverride || vars.CAMELOT_IMAGE_RUNNER || 'rio-build-01' }}
      extraSubstituters: ${{ vars.CAMELOT_SUI_SUBSTITUTER }}
      requireSigs: ${{ vars.CAMELOT_SUI_REQUIRE_SIGS }}
    secrets: inherit
  host-agent:
    name: breathe-host-agent image → ghcr.io
    uses: pleme-io/substrate/.github/workflows/image-push.yml@main
    with:
      imageAttr: agent-image
      imageName: pleme-io/breathe-host-agent
      tag: amd64-${{ startsWith(github.ref_name, 'camelot/') && 'camelot-' || '' }}r${{ github.run_number }}-${{ github.sha }}
      additionalTags: ${{ startsWith(github.ref_name, 'camelot/') && 'amd64-camelot-latest' || 'amd64-latest' }}
      runner: ${{ inputs.runnerOverride || vars.CAMELOT_IMAGE_RUNNER || 'rio-build-01' }}
      extraSubstituters: ${{ vars.CAMELOT_SUI_SUBSTITUTER }}
      requireSigs: ${{ vars.CAMELOT_SUI_REQUIRE_SIGS }}
    secrets: inherit
  api-server:
    name: breathe-api-server image → ghcr.io
    uses: pleme-io/substrate/.github/workflows/image-push.yml@main
    with:
      imageAttr: api-server-image
      imageName: pleme-io/breathe-api-server
      tag: amd64-${{ startsWith(github.ref_name, 'camelot/') && 'camelot-' || '' }}r${{ github.run_number }}-${{ github.sha }}
      additionalTags: ${{ startsWith(github.ref_name, 'camelot/') && 'amd64-camelot-latest' || 'amd64-latest' }}
      runner: ${{ inputs.runnerOverride || vars.CAMELOT_IMAGE_RUNNER || 'rio-build-01' }}
      extraSubstituters: ${{ vars.CAMELOT_SUI_SUBSTITUTER }}
      requireSigs: ${{ vars.CAMELOT_SUI_REQUIRE_SIGS }}
    secrets: inherit
