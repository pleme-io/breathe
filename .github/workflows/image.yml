# Build + push EVERY breathe OCI image on merge to main.
#
# Runs on the SELF-HOSTED rio-builder (x86_64) via substrate's image-push.yml —
# the same proven path hanabi / pangea-operator use. This is BILLING-INDEPENDENT
# (self-hosted runners do not consume GitHub-hosted minutes), which matters: the
# old `ubuntu-latest` jobs were dead-on-arrival whenever org GitHub-Actions
# billing lapsed. rio-builder has a working nix + network (the historical
# FOD-DNS-in-sandbox blocker is resolved — hanabi/pangea-operator build heavy nix
# images here daily), so the controller, host-agent, AND api-server all ship via
# the one reusable. breathe images stay PRIVATE (package visibility set
# out-of-band, unchanged). :latest is the moving pointer the rio HelmRelease pulls
# (pullPolicy: Always) — a new build needs a `kubectl rollout restart` to pick up.
name: image

on:
  push:
    branches: [main]
    paths:
      - "**/*.rs"
      - "**/Cargo.*"
      - "flake.nix"
      - "flake.lock"
      - ".github/workflows/image.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  controller:
    name: breathe-controller image → ghcr.io (rio-builder)
    uses: pleme-io/substrate/.github/workflows/image-push.yml@main
    with:
      imageAttr: image
      imageName: pleme-io/breathe-controller
      tag: latest
      runner: rio-build-01
    secrets: inherit
  host-agent:
    name: breathe-host-agent image → ghcr.io (rio-builder)
    uses: pleme-io/substrate/.github/workflows/image-push.yml@main
    with:
      imageAttr: agent-image
      imageName: pleme-io/breathe-host-agent
      tag: latest
      runner: rio-build-01
    secrets: inherit
  api-server:
    name: breathe-api-server image → ghcr.io (rio-builder)
    uses: pleme-io/substrate/.github/workflows/image-push.yml@main
    with:
      imageAttr: api-server-image
      imageName: pleme-io/breathe-api-server
      tag: latest
      runner: rio-build-01
    secrets: inherit
