# AUTO-RELEASE (default-on) for the pleme-breathe chart, under charts/pleme-breathe
# (no root Chart.yaml -- that's the single-chart shim's assumption). Uses the
# MONOREPO reusable instead (same shape as helmworks/akeyless-dev): it wraps
# `nix run .#release` = forge helm release-all, which discovers charts under
# charts/*, publishes any (name, version) not yet on the registry, and skips
# what's already there. No auto-bump here -- bump Chart.yaml's version by hand
# in the commit that changes the chart; merging is what ships it.
name: helm-release

on:
  push:
    branches: [main]
    paths:
      - "charts/pleme-breathe/**"
  workflow_dispatch: {}

jobs:
  release:
    uses: pleme-io/substrate/.github/workflows/helm-monorepo-auto-release.yml@main
    secrets: inherit
