syntax = "proto3";

package breathe.v1;

import "google/protobuf/empty.proto";
import "google/protobuf/struct.proto";

message Band {
  string api_version = 1;
  string kind = 2;
  google.protobuf.Struct metadata = 3;
  BandSpec spec = 4;
  BandStatus status = 5;
}

enum BandKind {
  BAND_KIND_UNSPECIFIED = 0;
  BAND_KIND_MEMORY = 1;
  BAND_KIND_CPU = 2;
  BAND_KIND_STORAGE = 3;
  BAND_KIND_ARC = 4;
  BAND_KIND_CGROUP = 5;
}

message BandSpec {
  optional string ceiling = 1;
  optional int64 cooldown_seconds = 2;
  optional string disruption_policy = 3;
  optional bool dry_run = 4;
  optional string floor = 5;
  optional string force_limit = 6;
  optional string force_limit_expiry = 7;
  optional double grow_above = 8;
  optional double grow_factor = 9;
  optional int64 max_staleness_seconds = 10;
  optional double setpoint = 11;
  optional double shrink_below = 12;
  optional double shrink_factor = 13;
  optional bool suspend = 14;
  TargetRef target_ref = 15;
}

message BandStatus {
  int64 carves_total = 1;
  repeated Condition conditions = 2;
  string conflict_manager = 3;
  int64 conflicts_total = 4;
  int64 cooldown_remaining_seconds = 5;
  string current_limit = 6;
  int64 deferrals_total = 7;
  string edge_tier = 8;
  bool effective_dry_run = 9;
  string effective_policy = 10;
  int64 freshness_seconds = 11;
  repeated TrendSample history = 12;
  string last_action_class = 13;
  int64 last_change_epoch = 14;
  string last_decision = 15;
  string last_util = 16;
  int64 observed_capacity = 17;
  int64 observed_cost_remaining_cents = 18;
  string observed_env_id = 19;
  int64 observed_generation = 20;
  int64 observed_used = 21;
  double observed_util = 22;
  string phase = 23;
}

message Catalog {
  repeated DimensionSpec dimensions = 1;
}

message Condition {
  string last_transition_time = 1;
  string message = 2;
  int64 observed_generation = 3;
  string reason = 4;
  string status = 5;
  string type = 6;
}

message DimensionSpec {
  string authoring_keyword = 1;
  repeated string depends_on = 2;
  string directionality = 3;
  string id = 4;
  bool is_host = 5;
  string maturity = 6;
  string name = 7;
  string purpose = 8;
  optional string upstream_mirror = 9;
}

message NodePool {
  string api_version = 1;
  string kind = 2;
  google.protobuf.Struct metadata = 3;
  NodePoolSpec spec = 4;
  NodePoolStatus status = 5;
}

message NodePoolSpec {
  int64 arc_max_gi_b = 1;
  map<string, int64> cgroup_max_gi_b = 2;
  string node_name = 3;
  bool write_enabled = 4;
}

message NodePoolStatus {
  int64 last_seen_epoch = 1;
  int64 managed_units = 2;
  string observed_node = 3;
  string phase = 4;
}

message TargetRef {
  string api_version = 1;
  string container = 2;
  string kind = 3;
  string name = 4;
}

message TrendSample {
  string decision = 1;
  int64 limit = 2;
  string phase = 3;
  string time = 4;
  double util = 5;
}

message BandListRequest {
  BandKind kind = 1;
  string namespace = 2;
}

message BandListResponse {
  repeated Band items = 1;
}

message BandGetRequest {
  BandKind kind = 1;
  string namespace = 2;
  string name = 3;
}

message BandPatchRequest {
  BandKind kind = 1;
  string namespace = 2;
  string name = 3;
  BandSpec body = 4;
}

message BandSetDryRunRequest {
  BandKind kind = 1;
  string namespace = 2;
  string name = 3;
  bool dry_run = 4;
}

message CatalogListRequest {
}

message NodepoolListRequest {
}

message NodepoolListResponse {
  repeated NodePool items = 1;
}

message NodepoolGetRequest {
  string name = 1;
}

message NodepoolSetWriteEnabledRequest {
  string name = 1;
  bool write_enabled = 2;
}

message HealthzRequest {
}

service Breathe {
  rpc BandList(BandListRequest) returns (BandListResponse);
  rpc BandGet(BandGetRequest) returns (Band);
  rpc BandPatch(BandPatchRequest) returns (Band);
  rpc BandSetDryRun(BandSetDryRunRequest) returns (Band);
  rpc CatalogList(CatalogListRequest) returns (Catalog);
  rpc NodepoolList(NodepoolListRequest) returns (NodepoolListResponse);
  rpc NodepoolGet(NodepoolGetRequest) returns (NodePool);
  rpc NodepoolSetWriteEnabled(NodepoolSetWriteEnabledRequest) returns (NodePool);
  rpc Healthz(HealthzRequest) returns (google.protobuf.Empty);
}
